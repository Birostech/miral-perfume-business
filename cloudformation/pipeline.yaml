AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Scents by Miral — CI/CD Pipeline.
  Deploy this stack ONCE manually from the AWS Console or CLI.
  After that, every push to your GitHub main branch triggers
  an automatic build and deployment.

Parameters:

  GitHubOwner:
    Type: String
    Description: Your GitHub username (e.g. john-doe)

  GitHubRepo:
    Type: String
    Description: The GitHub repository name (e.g. scents-by-miral)
    Default: scents-by-miral

  GitHubBranch:
    Type: String
    Description: Branch to watch and deploy from
    Default: main

  GitHubToken:
    Type: String
    NoEcho: true
    Description: >
      GitHub personal access token with repo scope.
      Generate one at: GitHub → Settings → Developer settings →
      Personal access tokens → Tokens (classic) → Generate new token.
      Select scope: repo.

# ================================================================
# RESOURCES
# ================================================================
Resources:

  # ── S3: Pipeline Artifact Store ──────────────────────────────
  # CodePipeline stores source zips and build outputs here.
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "sbm-pipeline-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30    # keep artifact history for 30 days

  # ── IAM: CodePipeline Role ───────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sbm-codepipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning, s3:ListBucket]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: [codebuild:BatchGetBuilds, codebuild:StartBuild]
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action: [cloudformation:*, iam:PassRole]
                Resource: "*"

  # ── IAM: CodeBuild Role ──────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sbm-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: "*"
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
                  # Also needs access to the website bucket (created by infrastructure.yaml)
                  - !Sub "arn:aws:s3:::scents-by-miral-website-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::scents-by-miral-website-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:GetTemplate
                Action2: [cloudfront:CreateInvalidation]
                Resource: "*"
              - Effect: Allow
                Action: [iam:PassRole]
                Resource: !GetAtt CloudFormationRole.Arn

  # Simplified combined policy to avoid YAML syntax issues above
  CodeBuildExtraPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: sbm-codebuild-extra
      Roles: [!Ref CodeBuildRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:CreateChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:GetTemplate
              - cloudfront:CreateInvalidation
              - iam:PassRole
              - iam:CreateRole
              - iam:AttachRolePolicy
              - iam:PutRolePolicy
              - iam:GetRole
              - cognito-idp:*
              - dynamodb:*
              - lambda:*
              - apigateway:*
              - s3:*
            Resource: "*"

  # ── IAM: CloudFormation Deployment Role ──────────────────────
  # CloudFormation assumes this role when creating/updating the
  # infrastructure stack (infrastructure.yaml).
  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sbm-cloudformation-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # AdministratorAccess lets CloudFormation create any resource.
        # Restrict this once the stack is stable and you know exactly
        # what resources it needs.
        - arn:aws:iam::aws:policy/AdministratorAccess

  # ── CodeBuild: Build Project ─────────────────────────────────
  # Runs buildspec.yml from the root of your repository.
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: scents-by-miral-build
      Description: Build and deploy Scents by Miral website
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        EnvironmentVariables:
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucket
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      TimeoutInMinutes: 20
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/scents-by-miral

  # ── CodePipeline ─────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: scents-by-miral-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        # ── Stage 1: Pull code from GitHub ──────────────────
        - Name: Source
          Actions:
            - Name: GitHub_Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: "1"
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: !Ref GitHubBranch
                OAuthToken: !Ref GitHubToken
                PollForSourceChanges: true
              OutputArtifacts:
                - Name: SourceCode
              RunOrder: 1

        # ── Stage 2: Build and package Lambda ───────────────
        - Name: Build
          Actions:
            - Name: CodeBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref CodeBuildProject
              RunOrder: 1

        # ── Stage 3: Deploy infrastructure via CloudFormation
        - Name: Deploy_Infrastructure
          Actions:
            - Name: CloudFormation_Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: scents-by-miral
                TemplatePath: BuildOutput::cloudformation/infrastructure.yaml
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "ArtifactBucket": "${ArtifactBucket}",
                    "LambdaZipKey": "lambda-api.zip"
                  }
              RunOrder: 1

# ================================================================
# OUTPUTS
# ================================================================
Outputs:

  PipelineName:
    Description: Name of the CodePipeline
    Value: !Ref Pipeline

  ArtifactBucket:
    Description: S3 bucket storing pipeline artifacts (pass this to infrastructure stack)
    Value: !Ref ArtifactBucket

  HowToMonitor:
    Description: Where to watch your pipeline run
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view"
